name: Keep Render Backend Awake

on:
  schedule:
    # Stagger away from :00/:05 load spikes; GitHub schedules are UTC and best-effort.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            https://auto-document-generator-backend.onrender.com/api/health
