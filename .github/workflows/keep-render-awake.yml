name: Keep Render Backend Awake

on:
  schedule:
    # Stagger away from :00/:10/:20 load spikes; GitHub schedules are UTC and best-effort.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            https://auto-document-generator-backend.onrender.com/api/health
