name: Keep Render Backend Awake

on:
  schedule:
    # GitHub schedule creation is best-effort and may be delayed by hours.
    # So each run stays alive and pings every 5 minutes internally.
    - cron: "2 */5 * * *"
  workflow_dispatch:

concurrency:
  group: keep-render-backend-awake
  cancel-in-progress: true

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 335
    steps:
      - name: Ping backend health endpoint every 5 minutes
        run: |
          for attempt in $(seq 1 66); do
            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] keep-awake ping ${attempt}/66"
            curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
              --header "Cache-Control: no-cache" \
              https://auto-document-generator-backend.onrender.com/api/health
            if [ "$attempt" -lt 66 ]; then
              sleep 300
            fi
          done
