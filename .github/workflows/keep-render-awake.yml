name: Keep Render Backend Awake

on:
  schedule:
    # Split into separate staggered schedules because GitHub often throttles dense comma crons.
    # Times are UTC and still best-effort.
    - cron: "2 * * * *"
    - cron: "7 * * * *"
    - cron: "12 * * * *"
    - cron: "17 * * * *"
    - cron: "22 * * * *"
    - cron: "27 * * * *"
    - cron: "32 * * * *"
    - cron: "37 * * * *"
    - cron: "42 * * * *"
    - cron: "47 * * * *"
    - cron: "52 * * * *"
    - cron: "57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            --header "Cache-Control: no-cache" \
            https://auto-document-generator-backend.onrender.com/api/health
